<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judul Halaman</title>

    <style>
        /* --- Tentang Saya --- */
        #about {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 20px;
            max-width: 700px;
            margin: 20px auto;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        #about h2 {
            color: #003366;
            border-bottom: 2px solid #003366;
            padding-bottom: 6px;
            margin-top: 0;
            margin-bottom: 16px;
        }

        #about p {
            display: flex;
            justify-content: flex-start;
            align-items: baseline;
            margin: 0;
            padding: 6px 0;
            border-bottom: 1px solid #e6e6e6;
        }

        #about strong {
            min-width: 180px;
            color: #003366;
            font-weight: 600;
            text-align: right;
            padding-right: 16px;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            #about p {
                flex-direction: column;
                align-items: flex-start;
            }

            #about strong {
                text-align: left;
                padding-right: 10px;
                margin-bottom: 2px;
            }
        }

        /* --- Kontak --- */
        #contact {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 700px;
            margin: 20px auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        #contact h2 {
            font-size: 24px;
            color: #003366;
            border-bottom: 2px solid #003366;
            padding-bottom: 5px;
            margin-bottom: 25px;
        }

        #contact label {
            display: block;
            font-weight: bold;
            color: #003366;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        #contact input[type="text"],
        #contact input[type="email"],
        #contact textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        #contact input:focus,
        #contact textarea:focus {
            border-color: #003366;
            box-shadow: 0 0 4px rgba(0, 51, 102, 0.3);
            outline: none;
        }

        #contact button {
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            margin-top: 15px;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #contact button:hover {
            background-color: #002244;
        }

        #contact button[type="reset"] {
            background-color: #ccc;
            color: #333;
            margin-left: 10px;
        }

        #contact button[type="reset"]:hover {
            background-color: #aaa;
        }
